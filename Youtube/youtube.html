<!DOCTYPE html>
<html>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <title>youtube clone</title>
        <style>
            .thumbnail{
                width: 300px;
                /* height: 300px;
                object-fit: cover;
                object-position: right;
                border: 2px; */
                display: block;
                margin-bottom: 12px;
            }
            .searchbar{
                font-size: 20px;
                display: block;
            }

            .video-author{
                
            }

            .video-stats{
                
            }

            .video-preview{
                display: inline-block;
                width: 300px;
                vertical-align: top;
                margin-right: 15px;
            }

            .channel-img{
                display: inline-block;
                width: 30px;
                vertical-align: top;
            }

            .video-info{
                display: inline-block;
                width: 200px;
            }

            .dp{
                width: 100%;
                border-radius: 40px;
            }

            .video-title{
                margin-top: 0;
                font-size: 14px;
                font-weight: 600;
            }

        </style>
    </head>
    <body>
        <input class="searchbar" type="text" placeholder="Search">

        <div class="video-preview">
            <div><img class="thumbnail" src="thumbnails/thumbnail-1.webp" alt="sundar pichai"></div>
            <div class="channel-img">
                <img class="dp" src="channel-pics/channel-pic-1.png" alt="channel image">
            </div>
            <div class="video-info">
                <div>
                <p class="video-title">Talking Tech and AI with Google CEO Sundar Pichai!</p>
                <p class="video-author">Marques Brownlee</p>
                <p class="video-stats">3.4M views &#183; 6 months ago</p>
                </div>
            </div>
            
    
            
        </div>

        <div class="video-preview">
            <img class="thumbnail" src="thumbnails/thumbnail-2.webp" alt="laughing man">
            <p class="video-title">Try Not To Laugh Challenge #9</p>
            <p class="video-author">Markplier</p>
            <p class="video-stats">19M views &#183; 4 years ago</p>
        </div>
        
    </body>
</html>
